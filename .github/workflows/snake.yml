name: Generate Snake

on:
  # හැම පැය 24 කටම වරක් auto run වෙන්න (cron job)
  schedule:
    - cron: "0 0 * * *"
  
  # ඕනෑම වෙලාවක අපිට manual run කරගන්න (ඔයා කලින් කරන්න හැදුවේ මේක)
  workflow_dispatch:
  
  # Main branch එකට push එකක් ආවම run වෙන්න
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Repository එක check out කිරීම
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Contributions Grid එකෙන් Snake Animation එක හැදීම
      - name: Generate GitHub Contributions Snake Animations
        uses: Platane/snk/svg-only@v3
        with:
          # (වැදගත්) මෙතන ${{ github.repository_owner }} කියන එකෙන්ම ඔයාගේ username එක auto ගන්නවා.
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. හදපු Snake image එක 'output' කියන branch එකට push කිරීම
      - name: Push Snake Image to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
